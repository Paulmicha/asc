
##
# Base file for local instance global (.env) vars definitions.
#
# This is used to generate the .env file in project docroot.
# @see u_instance_init() in asc/instance/instance.inc.sh
#
# By convention, variable names ending with "_C" are container paths, e.g. :
# API_APP_DOCROOT (on local machine) = API_APP_DOCROOT_C (in container).
#
# @example
#   # Need to rename and edit this file to make use of it.
#   mv SPECIMEN.env.yml env.yml
#

# Un "pointeur" d'ensemble de toute la stack. À changer en cas d'upgrade
# significative d'un ou plusieurs services, e.g. version majeure de Php, etc.
# Permet de tester des migrations en local (facilite le rollback).
# Inutile de garder dans les sources de la dev-stack au-delà de la "n - 1".
stack:
  version: specimen-2026
  old_version: specimen-2025

# Variables dédiées aux raccourcis et presets de ASC.
# Toutes les env vars ASC sont chargées dans le contexte d'appel docker compose.
# @see scripts/asc/extend/stack/compose.specimen-2024.yml
asc:
  apps: site api cas
  logs:
    base_path: data/logs
  db:
    ids: site api
    dumps:
      base_path: data/db-dumps
      base_path_c: /asc/data/db-dumps

# Generic ASC extensions reused (automatic local drush alias).
# @see asc/extensions/drush/asc/alias.docker-compose.hook.sh
# @example
#   make drush st
drush:
  service_name: site-app
  default_uri: drupal.specimen.localhost

# Drupal services setup.
site:
  # This points to Varnish (cf. site-proxy).
  domain: specimen.localhost
  # This points to Apache (cf. site-front).
  app_domain: drupal.specimen.localhost
  docroot: site
  docroot_c: /var/www/html
  service:
    name: site-app
  server:
    docroot: site/web
    docroot_c: /var/www/html/web
  db:
    host: site-db
    name: site
    user: site
    pass: site
    admin_pass: site
  api:
    middleware_user: specimen-drupal@specimen.com
    middleware_password: site
  # Hardcoded in :
  # @see $SITE_DOCROOT/web/sites/default/settings.php
  # ... but the private files base path is needed in :
  # @see scripts/asc/extend/site/update.sh
  files:
    # TODO [wip] permissions reset could make use of those too. There are 2 ways
    # to go about implementing permissions reset (i.e. make fix-perms) :
    # - manually (e.g. with another env var named like SITE_DRUPAL_SETTINGS_DIR)
    # - appending paths to the following global env vars :
    #   - PROTECTED_FILES
    #   - EXECUTABLE_FILES
    #   - WRITEABLE_DIRS
    #   - WRITEABLE_FILES
    #   @see asc/instance/fs_perms_set.hook.sh
    #   @see asc/instance/fs_ownership_set.hook.sh
    # public: $SITE_SERVER_DOCROOT/sites/default/files
    # public_c: $SITE_SERVER_DOCROOT_C/sites/default/files
    private: $SITE_DOCROOT/private
    private_c: $SITE_DOCROOT_C/private
    # tmp: $SITE_DOCROOT/tmp
    # tmp_c: $SITE_DOCROOT_C/tmp
  redis:
    host: site-cache-object
    port: 6379
  proxy:
    # Reverse proxy subnet (e.g. '172.19.0.0/16', '172.22.0.0/16', etc).
    # To get it, e.g. if the compose network is called 'specimen_default', run :
    # $ docker network inspect specimen_default | grep Subnet | cut -d\" -f4
    # TODO [evol] hardcode the compose network name and automatically provide
    # the value ?
    # TODO [wip] debug varnish "Bad Gateway" error (this fails).
    subnet: 172.19.0.0/16

# API Platform (middleware) services setup.
api:
  domain: api.specimen.localhost
  internal_domain: api-front
  docroot: api
  docroot_c: /var/www/html
  service:
    name: api-app
  app:
    docroot: api/api
    docroot_c: /var/www/html/api
  server:
    docroot: api/api/public
    docroot_c: /var/www/html/api/public
  db:
    host: api-db
    name: api
    user: api
    pass: api
    admin_pass: api
